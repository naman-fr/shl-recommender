<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHL Assessment Recommender</title>
<meta name="description" content="AI-powered conversational assistant for finding the right SHL assessments">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--surface:#111827;--surface2:#1e293b;--surface3:#293548;
  --border:#334155;--text:#e2e8f0;--text-dim:#94a3b8;--text-muted:#64748b;
  --accent:#6366f1;--accent2:#818cf8;--accent-glow:rgba(99,102,241,.15);
  --green:#10b981;--orange:#f59e0b;--red:#ef4444;--blue:#3b82f6;
  --radius:12px;--radius-lg:16px;
}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text)}
body{display:flex;flex-direction:column;overflow:hidden}

/* ── Header ─────────────────────────── */
.header{
  padding:16px 24px;display:flex;align-items:center;gap:14px;
  background:linear-gradient(135deg,rgba(99,102,241,.08),rgba(16,185,129,.05));
  border-bottom:1px solid var(--border);backdrop-filter:blur(12px);z-index:10;
}
.header .logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#8b5cf6);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:#fff;flex-shrink:0}
.header h1{font-size:18px;font-weight:600;letter-spacing:-.3px}
.header .badge{font-size:11px;padding:3px 8px;border-radius:20px;background:var(--accent-glow);color:var(--accent2);font-weight:500;border:1px solid rgba(99,102,241,.2)}
.header .status{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--green)}
.header .status::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Chat Container ─────────────────── */
.chat-container{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
.chat-container::-webkit-scrollbar{width:6px}
.chat-container::-webkit-scrollbar-track{background:transparent}
.chat-container::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ── Messages ───────────────────────── */
.msg{display:flex;gap:10px;max-width:780px;animation:fadeIn .3s ease}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.bot{align-self:flex-start}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.msg .avatar{width:32px;height:32px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
.msg.bot .avatar{background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff}
.msg.user .avatar{background:var(--surface3);color:var(--text-dim)}

.msg .bubble{padding:14px 18px;border-radius:var(--radius-lg);font-size:14px;line-height:1.65;word-break:break-word}
.msg.bot .bubble{background:var(--surface);border:1px solid var(--border);border-top-left-radius:4px}
.msg.user .bubble{background:linear-gradient(135deg,var(--accent),#7c3aed);color:#fff;border-top-right-radius:4px}
.msg .bubble strong{font-weight:600}
.msg .bubble a{color:var(--accent2);text-decoration:none;border-bottom:1px solid rgba(129,140,248,.3)}
.msg .bubble a:hover{border-bottom-color:var(--accent2)}

/* ── Assessment Cards ───────────────── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-top:12px}
.card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:all .2s;cursor:default}
.card:hover{border-color:var(--accent);box-shadow:0 0 20px var(--accent-glow);transform:translateY(-1px)}
.card-name{font-weight:600;font-size:14px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.card-name a{color:var(--accent2);text-decoration:none}
.card-name a:hover{text-decoration:underline}
.card-desc{font-size:12.5px;color:var(--text-dim);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;flex-wrap:wrap;gap:6px}
.tag{font-size:11px;padding:3px 8px;border-radius:6px;font-weight:500}
.tag.duration{background:rgba(59,130,246,.12);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
.tag.remote{background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.2)}
.tag.adaptive{background:rgba(245,158,11,.12);color:var(--orange);border:1px solid rgba(245,158,11,.2)}
.tag.category{background:rgba(139,92,246,.12);color:#a78bfa;border:1px solid rgba(139,92,246,.2)}

/* ── Typing indicator ───────────────── */
.typing{display:flex;gap:4px;padding:8px 0}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--text-muted);animation:bounce .6s infinite alternate}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{to{transform:translateY(-6px);opacity:.3}}

/* ── Input Area ─────────────────────── */
.input-area{padding:16px 24px 20px;border-top:1px solid var(--border);background:linear-gradient(0deg,var(--bg),rgba(17,24,39,.95))}
.input-wrap{display:flex;gap:10px;max-width:820px;margin:0 auto}
.input-wrap textarea{
  flex:1;resize:none;border:1px solid var(--border);background:var(--surface);color:var(--text);
  padding:12px 16px;border-radius:var(--radius);font-family:inherit;font-size:14px;
  outline:none;transition:border-color .2s;min-height:46px;max-height:120px;line-height:1.5
}
.input-wrap textarea::placeholder{color:var(--text-muted)}
.input-wrap textarea:focus{border-color:var(--accent)}
.input-wrap button{
  width:46px;height:46px;border-radius:var(--radius);border:none;
  background:linear-gradient(135deg,var(--accent),#7c3aed);color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0
}
.input-wrap button:hover{transform:scale(1.05);box-shadow:0 0 16px var(--accent-glow)}
.input-wrap button:disabled{opacity:.4;cursor:not-allowed;transform:none}
.input-wrap button svg{width:20px;height:20px}

.suggestions{display:flex;flex-wrap:wrap;gap:8px;max-width:820px;margin:10px auto 0;padding:0}
.suggestions button{
  font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);
  background:var(--surface);color:var(--text-dim);cursor:pointer;font-family:inherit;transition:all .15s
}
.suggestions button:hover{border-color:var(--accent);color:var(--accent2);background:var(--accent-glow)}

@media(max-width:600px){
  .header{padding:12px 16px}.header h1{font-size:15px}
  .chat-container{padding:16px}.cards-grid{grid-template-columns:1fr}
  .input-area{padding:12px 16px 16px}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">S</div>
  <div>
    <h1>SHL Assessment Recommender</h1>
  </div>
  <span class="badge">AI Agent</span>
  <div class="status" id="status">Online</div>
</div>

<div class="chat-container" id="chat"></div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="input" placeholder="Ask about SHL assessments..." rows="1"></textarea>
    <button id="sendBtn" onclick="sendMessage()" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div class="suggestions" id="suggestions">
    <button onclick="useSuggestion(this)">Java assessments for mid-level developers</button>
    <button onclick="useSuggestion(this)">Short personality tests under 15 minutes</button>
    <button onclick="useSuggestion(this)">Remote coding simulations</button>
    <button onclick="useSuggestion(this)">Leadership assessments for managers</button>
  </div>
</div>

<script>
const SESSION_ID = crypto.randomUUID();
const API_URL = window.location.origin;
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const suggestionsEl = document.getElementById('suggestions');
let isLoading = false;

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// Show welcome message on load
window.addEventListener('load', () => {
  addBotMessage("Hello! 👋 I'm the **SHL Assessment Recommender**. I can help you find the perfect SHL assessments for your hiring or development needs.\n\nTell me about:\n• The **role** you're hiring for\n• The **skills** you want to assess\n• Any requirements (duration, remote, job level)\n\nOr try one of the suggestions below!", []);
});

function useSuggestion(btn) {
  inputEl.value = btn.textContent;
  sendMessage();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;
  isLoading = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  suggestionsEl.style.display = 'none';

  addUserMessage(text);
  const typingEl = addTyping();

  try {
    const res = await fetch(API_URL + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: SESSION_ID, message: text })
    });
    if (!res.ok) throw new Error(`Server error: ${res.status}`);
    const data = await res.json();
    typingEl.remove();
    addBotMessage(data.response, data.recommendations || []);
  } catch (err) {
    typingEl.remove();
    addBotMessage("Sorry, I encountered an error connecting to the server. Please make sure the server is running and try again. 🔧", []);
    console.error(err);
  } finally {
    isLoading = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

function addUserMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="avatar">👤</div><div class="bubble">${escapeHtml(text)}</div>`;
  chatEl.appendChild(div);
  scrollBottom();
}

function addBotMessage(text, cards) {
  const div = document.createElement('div');
  div.className = 'msg bot';
  let html = `<div class="avatar">🤖</div><div class="bubble">${formatMarkdown(text)}`;
  if (cards && cards.length > 0) {
    html += `<div class="cards-grid">`;
    cards.forEach(c => {
      const dur = c.duration && c.duration !== 'N/A' ? c.duration : '';
      const rem = c.remote === 'yes' ? '✅ Remote' : '';
      const adp = c.adaptive === 'yes' ? '🔄 Adaptive' : '';
      const cats = (c.categories || []).slice(0, 2);
      html += `<div class="card">
        <div class="card-name"><a href="${escapeHtml(c.url)}" target="_blank" rel="noopener">${escapeHtml(c.name)}</a></div>
        <div class="card-desc">${escapeHtml(c.description || '')}</div>
        <div class="card-meta">
          ${dur ? `<span class="tag duration">⏱ ${escapeHtml(dur)}</span>` : ''}
          ${rem ? `<span class="tag remote">${rem}</span>` : ''}
          ${adp ? `<span class="tag adaptive">${adp}</span>` : ''}
          ${cats.map(k => `<span class="tag category">${escapeHtml(k)}</span>`).join('')}
        </div>
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;
  div.innerHTML = html;
  chatEl.appendChild(div);
  scrollBottom();
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `<div class="avatar">🤖</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chatEl.appendChild(div);
  scrollBottom();
  return div;
}

function scrollBottom() {
  requestAnimationFrame(() => chatEl.scrollTop = chatEl.scrollHeight);
}

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatMarkdown(text) {
  if (!text) return '';
  let h = escapeHtml(text);
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  h = h.replace(/^• (.+)$/gm, '&bull; $1');
  h = h.replace(/\n/g, '<br>');
  return h;
}
</script>
</body>
</html>
